# /etc/nginx/conf.d/airbulletin.conf
#
# Existing servers preserved exactly.
# Added: location /golden/ to serve the inversion tool alongside the Flask app.
#
# After editing:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name files.caniburn.today;

    root /srv/ftp;
    index index.html index.htm;

    location / {
        autoindex on;  # Enables directory listing
        autoindex_exact_size off;
        autoindex_localtime on;
        allow all;
    }

    # Optional: Prevent execution of scripts for security
    location ~* \.(php|pl|cgi|sh|py)$ {
        return 403;
    }
}


server {
    listen 80;
    server_name caniburn.today www.caniburn.today;

    # ── Golden inversion tool ─────────────────────────────────────────────────
    # Serves both index.html and sounding.json from /var/www/golden_inversion/
    # at the path /golden/.
    #
    # The HTML page fetches sounding.json at a relative URL, so both must be
    # under the same path prefix — this location block handles both.

    location /golden/ {
        alias /var/www/golden_inversion/;
        index index.html;

        # sounding.json — CORS so WordPress JS can fetch it cross-origin
        location /golden/sounding.json {
            alias /var/www/golden_inversion/sounding.json;
            add_header Access-Control-Allow-Origin  "*"                always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS"     always;
            add_header Cache-Control                "public, max-age=900";
            add_header Content-Type                 "application/json" always;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                return 204;
            }
        }

        # HTML — allow iframe embedding from WordPress
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header Cache-Control "public, max-age=300";

        try_files $uri $uri/ /golden/index.html;
    }

    # ── Existing Flask app (unchanged) ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Prefix /;
    }
}
