# /etc/nginx/sites-available/golden
#
# Serves:
#   https://your-domain/sounding.json   — fetched by the browser JS
#   https://your-domain/                — the HTML infographic (iframe target)
#
# After editing:
#   sudo ln -s /etc/nginx/sites-available/golden /etc/nginx/sites-enabled/golden
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.example.com;   # ← change this

    # Redirect HTTP → HTTPS (certbot will fill this in automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.example.com;   # ← change this

    # TLS — fill in by running: sudo certbot --nginx -d your-domain.example.com
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/golden;
    index index.html;

    # ── sounding.json ────────────────────────────────────────────────────────
    location /sounding.json {
        # Allow WordPress (or any origin) to fetch this via JS
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=900";   # browsers cache 15 min
        add_header Content-Type  "application/json";
        try_files /sounding.json =404;
    }

    # ── HTML infographic ─────────────────────────────────────────────────────
    location / {
        add_header X-Frame-Options "ALLOWALL";            # allow WordPress iframe
        add_header Cache-Control "public, max-age=300";   # 5 min browser cache
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy same-origin;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/golden-access.log;
    error_log  /var/log/nginx/golden-error.log;
}
